{% extends "base.html" %}

{% block title %}Оформление заказа{% endblock %}

{% block content %}
<div class="container">
    <h1 class="section-title">Оформление заказа</h1>
    
    <div class="row" style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
        <!-- Форма заказа -->
        <div class="bg-white" style="padding: 30px; border-radius: 15px; box-shadow: var(--shadow);">
            <form method="POST" id="orderForm">
                <h3 style="margin-bottom: 20px;">Контактные данные</h3>
                
                <div class="form-group">
                    <label class="form-label">Ваше имя *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Телефон *</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+7 (999) 123-45-67" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Адрес доставки *</label>
                    <input type="text" name="address" class="form-control" placeholder="Улица, дом, квартира" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Комментарий к заказу</label>
                    <textarea name="comment" class="form-control" placeholder="Пожелания, этаж, домофон..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-success w-100" style="padding: 15px;">
                    <i class="fas fa-check"></i> Подтвердить заказ
                </button>
            </form>
        </div>
        
        <!-- Информация о заказе -->
        <div class="cart-summary">
            <h3 style="margin-bottom: 20px;">Ваш заказ</h3>
            
            <div id="orderSummary">
                <div class="text-center" style="padding: 30px;">
                    <div class="spinner" style="margin: 0 auto;"></div>
                    <p style="margin-top: 15px;">Загрузка...</p>
                </div>
            </div>
            
            <div style="margin-top: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px;">
                <p style="margin-bottom: 5px;"><i class="fas fa-info-circle" style="color: var(--primary);"></i> Минимальное время доставки: 60 минут</p>
                <p style="margin-bottom: 0;"><i class="fas fa-ruble-sign" style="color: var(--primary);"></i> Оплата наличными или картой курьеру</p>
            </div>
        </div>
    </div>
</div>

<script>
// Загрузка информации о заказе
function loadOrderSummary() {
    fetch('/api/cart')
        .then(response => response.json())
        .then(data => {
            const summary = document.getElementById('orderSummary');
            
            if (data.items.length === 0) {
                window.location.href = "{{ url_for('menu') }}";
                return;
            }
            
            let itemsHtml = '';
            data.items.forEach(item => {
                itemsHtml += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0;">
                        <span>${item.name} x${item.quantity}</span>
                        <span>${item.total} ₽</span>
                    </div>
                `;
            });
            
            summary.innerHTML = `
                ${itemsHtml}
                <div style="display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 700; margin-top: 20px;">
                    <span>Итого:</span>
                    <span style="color: var(--primary);">${data.total} ₽</span>
                </div>
            `;
        });
}

// Валидация телефона
document.getElementById('orderForm')?.addEventListener('submit', function(e) {
    const phone = this.phone.value;
    const phoneRegex = /^\+?[78][0-9]{10}$/;
    
    if (!phoneRegex.test(phone.replace(/\D/g, ''))) {
        e.preventDefault();
        alert('Введите корректный номер телефона');
    }
});

// Загружаем при загрузке страницы
document.addEventListener('DOMContentLoaded', loadOrderSummary);
</script>
{% endblock %}
